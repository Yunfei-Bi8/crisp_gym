[workspace]
preview = ["pixi-build"]
authors = [
    "Maximilian Dösch <doesch.maximilian@gmail.com>",
    "Daniel San José Pro <42489409+danielsanjosepro@users.noreply.github.com>"
]
channels = ["https://fast.prefix.dev/conda-forge"]
name = "crisp_gym"
platforms = ["linux-64"]

[dependencies]
python = "3.12.*"
compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"
typing_inspect = ">=0.9.0,<0.10"
libstdcxx-ng = ">=12.2.0"


[target.linux.dependencies]
libgl-devel = "*"

[environments]
dev = { features = ["dev"] }
lerobot = { features = ["lerobot"] }
jazzy = { features = ["jazzy"] }
jazzy-lerobot = { features = ["jazzy", "lerobot", "dev"] }

[feature.dev.pypi-dependencies]
pre-commit = "*"
ruff = "*"
debugpy = ">=1.8.14,<2"
pudb = ">=2025.1.3, <2026"

[feature.lerobot.dependencies]
pynput = "*"

[feature.lerobot.pypi-dependencies]
pyspacemouse = "*"
# === Working version ===
# lerobot = { git = "https://github.com/huggingface/lerobot", rev = "dacd1d7f5c719c3e56d7b7154a751bef6d5bd23c", extras = ["smolvla"]}
# === Newer version ===
# lerobot = { git = "https://github.com/huggingface/lerobot", rev = "74690e3f56a90b6ea314afbfb3b801a3d842a005", extras = ["smolvla"]}
# === Local version ===
lerobot = { path = "../lerobot/", editable = true }

[feature.jazzy]
channels = ["https://prefix.dev/robostack-jazzy"]

[feature.jazzy.dependencies]
python = "3.12.*"
# NOTE: ros-jazzy packages pin numpy<2.0 (compiled against numpy 1.x ABI),
# so do NOT add numpy>=2.0 here — that conflicts with all ROS packages.
# ros-jazzy-desktop pulls in depthimage-to-laserscan which requires numpy<2.0
# Use ros-base + only the packages crisp_py actually needs
ros-jazzy-ros-base = "*"
ros-jazzy-control-msgs = "*"
ros-jazzy-controller-manager-msgs = "*"
ros-jazzy-trajectory-msgs = "*"
ros-jazzy-geometry-msgs = "*"
ros-jazzy-sensor-msgs = "*"
ros-jazzy-image-transport = "*"
ros-jazzy-cv-bridge = "*"
colcon-common-extensions = "*"
rosdep = "*"
ros-jazzy-rmw-cyclonedds-cpp = "*"
pinocchio = "*"

[pypi-dependencies]
crisp_gym = { path = ".", editable = true }
crisp_python = { path = "../crisp_py", editable = true }

[tasks]
configure = "bash scripts/configure.sh"
